name: Build Native DLLs

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for updated DLLs'
        required: false
        default: 'build: recompile cimgui/cimguizmo native DLLs'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: arm64
            cmake_arch: ARM64
    steps:
      - uses: actions/checkout@v4

      - name: Configure & Build
        working-directory: Tool/NativeBuild
        run: |
          $rid = "win-${{ matrix.arch }}"
          $buildDir = "build/$rid"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          cmake -S . -B $buildDir -DTARGET_RID="$rid" -A ${{ matrix.cmake_arch }}
          cmake --build $buildDir --config Release

      - name: Verify exports
        working-directory: Tool/NativeBuild
        run: |
          $dll = Resolve-Path "../../Src/Alco.ImGUI/runtimes/win-${{ matrix.arch }}/native/cimgui.dll"
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $dumpbin = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          $exports = & $dumpbin.FullName /exports $dll | Select-String "cimgui_set_error_callback"
          if ($exports) { Write-Host "OK: cimgui_set_error_callback found" }
          else { Write-Error "MISSING: cimgui_set_error_callback not in exports"; exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: Src/Alco.ImGUI/runtimes/win-${{ matrix.arch }}/native/*.dll

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cc: gcc
            cxx: g++
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure & Build
        working-directory: Tool/NativeBuild
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          rid="linux-${{ matrix.arch }}"
          mkdir -p "build/$rid"
          cmake_args=(-S . -B "build/$rid" -DTARGET_RID="$rid")
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            cmake_args+=(-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64)
          fi
          cmake "${cmake_args[@]}"
          cmake --build "build/$rid" --config Release

      - name: Verify exports
        run: |
          so="Src/Alco.ImGUI/runtimes/linux-${{ matrix.arch }}/native/cimgui.so"
          if nm -D "$so" | grep -q cimgui_set_error_callback; then
            echo "OK: cimgui_set_error_callback found"
          else
            echo "MISSING: cimgui_set_error_callback not in exports" >&2; exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: Src/Alco.ImGUI/runtimes/linux-${{ matrix.arch }}/native/*.so

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x86_64
          - arch: arm64
            cmake_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Configure & Build
        working-directory: Tool/NativeBuild
        run: |
          rid="osx-${{ matrix.arch }}"
          mkdir -p "build/$rid"
          cmake -S . -B "build/$rid" \
            -DTARGET_RID="$rid" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_arch }}"
          cmake --build "build/$rid" --config Release

      - name: Verify exports
        run: |
          dylib="Src/Alco.ImGUI/runtimes/osx-${{ matrix.arch }}/native/cimgui.dylib"
          if nm -g "$dylib" | grep -q cimgui_set_error_callback; then
            echo "OK: cimgui_set_error_callback found"
          else
            echo "MISSING: cimgui_set_error_callback not in exports" >&2; exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: osx-${{ matrix.arch }}
          path: Src/Alco.ImGUI/runtimes/osx-${{ matrix.arch }}/native/*.dylib

  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            abi: arm64-v8a
          - arch: x64
            abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Configure & Build
        working-directory: Tool/NativeBuild
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rid="android-${{ matrix.arch }}"
          mkdir -p "build/$rid"
          cmake -S . -B "build/$rid" \
            -DTARGET_RID="$rid" \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${{ matrix.abi }}" \
            -DANDROID_PLATFORM=android-28
          cmake --build "build/$rid" --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: Src/Alco.ImGUI/runtimes/android-${{ matrix.arch }}/native/*.so

  commit-artifacts:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Place artifacts into runtimes
        run: |
          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64 android-x64 android-arm64; do
            src="_artifacts/$rid"
            dest="Src/Alco.ImGUI/runtimes/$rid/native"
            if [ -d "$src" ]; then
              mkdir -p "$dest"
              cp -v "$src"/* "$dest/"
            fi
          done

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Src/Alco.ImGUI/runtimes/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Src/Alco.ImGUI/runtimes/
          git commit -m "${{ inputs.commit_message }}"
          git push
