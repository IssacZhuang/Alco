name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    strategy:
      matrix:
        include:
          - build: Windows_Debug
            os: windows-2022
            configuration: Debug
            runtime: win-x64
          - build: Windows_Release
            os: windows-2022
            configuration: Release
            runtime: win-x64
          - build: Linux_Debug
            os: ubuntu-latest
            configuration: Debug
            runtime: linux-x64
          - build: Linux_Release
            os: ubuntu-latest
            configuration: Release
            runtime: linux-x64
          - build: MacOS_Debug
            os: macos-latest
            configuration: Debug
            runtime: osx-arm64
          - build: MacOS_Release
            os: macos-latest
            configuration: Release
            runtime: osx-arm64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'
        
    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }}
    
    - name: Test
      run: dotnet test --configuration ${{ matrix.configuration }} -r ${{ matrix.runtime }} --logger trx --results-directory "TestResults-${{ matrix.runtime }}-${{ matrix.configuration }}"

    - name: Upload dotnet test results
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-results-${{ matrix.runtime }}-${{ matrix.configuration }}
        path: TestResults-${{ matrix.runtime }}-${{ matrix.configuration }}
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}
