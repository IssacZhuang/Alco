trigger:
- main

resources:
- repo: self


stages:
- stage: Build
  jobs:
  - job: Build
    timeoutInMinutes: 30
  
    variables:
      macOS: macOS-latest
      linux: Ubuntu-latest
      windows: windows-2022
      outputDir: '$(Build.SourcesDirectory)/Bin'
  
    strategy:
      matrix:
        Windows_Debug: 
          image: ${{ variables.windows }}
          mode: Debug
          runtime: win-x64
        Windows_Release:
          image: ${{ variables.windows }}
          mode: Release
          runtime: win-x64
        Linux_Debug:
          image: ${{ variables.linux }}
          mode: Debug
          runtime: linux-x64
        Linux_Release:
          image: ${{ variables.linux }}
          mode: Release
          runtime: linux-x64
        MacOS_Debug:
          image: ${{ variables.macOS }}
          mode: Debug
          runtime: osx-x64
        MacOS_Release:
          image: ${{ variables.macOS }}
          mode: Release
          runtime: osx-x64
    
    pool:
      vmImage: $(image)

    steps:
    - checkout: self
      clean: true
      submodules: true
    
    - task: UseDotNet@2
      inputs:
        version: '9.x'
      
    - task: DotNetCoreCLI@2
      inputs:
        command: test
        projects: '**/**.csproj'
        arguments: '--configuration $(mode) -r $(runtime)'
        publishTestResults: true
      displayName: 'Test'
    
    - script: dotnet build --configuration $(mode)
      displayName: 'Build'

    - script: ls -R $(outputDir)
      displayName: 'List files'
          

